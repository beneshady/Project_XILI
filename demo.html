<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>肉鸽象棋 - Web Demo</title>
  <style>
    :root {
      color-scheme: light;
      background: #f8efe0;
      color: #3f2b1f;
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      box-sizing: border-box;
      background: #f8efe0;
    }
    main {
      display: grid;
      gap: 12px;
      justify-items: center;
    }
    header {
      width: min(960px, 96vw);
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }
    #status {
      margin: 4px 0 0;
      color: #7a5f45;
      font-size: 14px;
    }
    button {
      border: 0;
      border-radius: 6px;
      background: #b98a55;
      color: #fff;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #a67645;
    }
    canvas {
      width: min(960px, 96vw);
      max-height: calc(100vh - 120px);
      height: auto;
      border: 1px solid rgba(80, 45, 20, 0.22);
      background: #f8efe0;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>肉鸽象棋</h1>
        <p id="status">加载中...</p>
      </div>
      <button id="restart-button" type="button">重新开始</button>
    </header>
    <canvas id="game-canvas" aria-label="肉鸽象棋 Web Demo"></canvas>
  </main>
  <script src="js/web-demo.js"></script>
</body>
</html>
