<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>肉鸽象棋 - Web Demo</title>
  <style>
    :root {
      color-scheme: light;
      background: #f8efe0;
      color: #3f2b1f;
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      box-sizing: border-box;
      background: #f8efe0;
    }
    main {
      display: grid;
      gap: 12px;
      justify-items: center;
    }
    header {
      width: min(960px, 96vw);
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }
    #status {
      margin: 4px 0 0;
      color: #7a5f45;
      font-size: 14px;
    }
    button {
      border: 0;
      border-radius: 6px;
      background: #b98a55;
      color: #fff;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #a67645;
    }
    canvas {
      width: min(960px, 96vw);
      max-height: calc(100vh - 120px);
      height: auto;
      border: 1px solid rgba(80, 45, 20, 0.22);
      background: #f8efe0;
      cursor: pointer;
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(40, 25, 15, 0.55);
      display: grid;
      place-items: center;
      z-index: 10;
    }
    .overlay[hidden] { display: none; }
    .modal {
      background: #fbf3e2;
      border: 1px solid rgba(80, 45, 20, 0.3);
      border-radius: 10px;
      padding: 20px 24px;
      min-width: 320px;
      max-width: 92vw;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      color: #3f2b1f;
    }
    .modal h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }
    .modal .stats {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 12px;
      margin-bottom: 12px;
      font-size: 15px;
    }
    .modal .stats .k { color: #7a5f45; }
    .modal .stats .v { font-weight: bold; }
    .modal .rank-line {
      color: #a8541c;
      font-weight: bold;
      margin: 6px 0 12px;
    }
    .modal label {
      display: block;
      margin: 8px 0 4px;
      font-size: 14px;
      color: #7a5f45;
    }
    .modal input[type=text] {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      font-size: 15px;
      border: 1px solid rgba(80, 45, 20, 0.3);
      border-radius: 6px;
      background: #fff;
      color: #3f2b1f;
    }
    .modal .actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .modal button.secondary {
      background: #d9c6a3;
      color: #3f2b1f;
    }
    .modal button.secondary:hover {
      background: #c8b08a;
    }
    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      margin: 8px 0;
    }
    .leaderboard-table th,
    .leaderboard-table td {
      padding: 6px 10px;
      text-align: left;
      border-bottom: 1px solid rgba(80, 45, 20, 0.12);
    }
    .leaderboard-table th {
      color: #7a5f45;
      font-weight: normal;
      font-size: 12px;
    }
    .leaderboard-table tr.current {
      background: #f3e0b8;
      font-weight: bold;
    }
    .leaderboard-table td.rank { width: 36px; color: #7a5f45; }
    .leaderboard-table td.score,
    .leaderboard-table td.time { text-align: right; font-variant-numeric: tabular-nums; }
    .leaderboard-empty {
      color: #7a5f45;
      text-align: center;
      padding: 16px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>肉鸽象棋</h1>
        <p id="status">加载中...</p>
      </div>
      <div style="display:flex; gap:8px;">
        <button id="leaderboard-button" type="button">排行榜</button>
        <button id="restart-button" type="button">重新开始</button>
      </div>
    </header>
    <canvas id="game-canvas" aria-label="肉鸽象棋 Web Demo"></canvas>
  </main>
  <div id="leaderboard-overlay" class="overlay" hidden></div>
  <script src="js/web-demo.js"></script>
</body>
</html>
