<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>肉鸽象棋 · Logic Harness（只加载 GameLogic.js）</title>
  <style>
    body {
      font-family: 'Courier New', monospace;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    h1 { margin: 0 0 12px; font-size: 20px; }
    .info {
      background: #e3f2fd;
      border: 2px solid #2196f3;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
    }
    .info code { background: #fff; padding: 2px 6px; border-radius: 3px; }
    pre {
      background: #fff;
      padding: 10px;
      border-radius: 4px;
      border: 1px solid #ddd;
      overflow: auto;
    }
    #output {
      background: #fff;
      border: 2px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
      white-space: pre;
      font-size: 13px;
      line-height: 1.45;
      max-height: 70vh;
      overflow: auto;
    }
    button {
      padding: 8px 14px;
      margin-right: 8px;
      border: 0;
      border-radius: 6px;
      background: #2196f3;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { background: #1976d2; }
    label { margin-right: 10px; }
    input[type="number"] {
      width: 80px;
      padding: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <h1>♔ 肉鸽象棋 · Logic Harness ♟</h1>

  <div class="info">
    <strong>说明：</strong>本页面<b>只</b>加载 <code>js/GameLogic.js</code>，不加载 Renderer.js，
    用于验证逻辑层无任何前端渲染依赖。打开 DevTools (F12) 控制台使用：
<pre>GameLogic.createInitialState({ seed: 42 })
GameLogic.handlePlayerMove(state, { x: 3, y: 3 })
GameLogic.executeEnemyTurn(state)
GameLogic.formatBoardAscii(state)</pre>
  </div>

  <div>
    <label>seed <input type="number" id="seed" value="42"></label>
    <label>turns <input type="number" id="turns" value="40"></label>
    <label><input type="checkbox" id="ascii" checked> 每回合打印棋盘</label>
    <button id="run">运行 Harness</button>
    <button id="clear">清空</button>
  </div>

  <div id="output">尚未运行。</div>

  <!-- 关键：此页面只加载 Model 层 -->
  <script src="../js/GameLogic.js"></script>
  <script>
    // 沙箱校验：保证本 html 没有加载 Renderer.js
    if (typeof Renderer !== 'undefined') {
      throw new Error('[Harness] Renderer is loaded, this page must stay Model-only');
    }

    const $ = (id) => document.getElementById(id);
    const out = $('output');

    function write(line) { out.textContent += line + '\n'; }

    function pickMove(state) {
      const accessible = [];
      for (const cell of state.grid.cells.values()) {
        if (cell.isPlayerAccessible && cell.entity !== state.player) {
          accessible.push(cell);
        }
      }
      if (accessible.length === 0) return null;

      const captures = accessible.filter(c =>
        c.entity && c.entity.team === GameLogic.Team.ENEMY && !c.isThreatened);
      if (captures.length) return captures[Math.floor(state.rng() * captures.length)].position;

      const coins = accessible.filter(c => c.hasCoin && !c.isThreatened);
      if (coins.length) return coins[Math.floor(state.rng() * coins.length)].position;

      const safe = accessible.filter(c => !c.isThreatened && !c.entity);
      if (safe.length) return safe[Math.floor(state.rng() * safe.length)].position;

      return accessible[Math.floor(state.rng() * accessible.length)].position;
    }

    function runHarness() {
      out.textContent = '';
      const seed  = Number($('seed').value) || 42;
      const turns = Number($('turns').value) || 40;
      const ascii = $('ascii').checked;

      write(`[Harness] seed=${seed} turns=${turns} ascii=${ascii}`);
      write('='.repeat(72));

      const state = GameLogic.createInitialState({ seed });
      if (ascii) {
        write(GameLogic.formatBoardAscii(state));
        write('-'.repeat(72));
      }

      let played = 0;
      for (let t = 0; t < turns; t++) {
        if (GameLogic.isGameOver(state)) break;
        const target = pickMove(state);
        if (!target) { write('[Harness] no move, aborting'); break; }
        if (!GameLogic.handlePlayerMove(state, target)) break;
        GameLogic.executeEnemyTurn(state);
        played++;
        if (ascii) {
          write(GameLogic.formatBoardAscii(state));
          write('-'.repeat(72));
        }
      }

      write('='.repeat(72));
      write('[Harness] event log:');
      for (const line of state.log) write('  ' + line);

      write('='.repeat(72));
      const unlocked = Object.entries(state.skills).filter(([,lv]) => lv > 0)
        .map(([id,lv]) => `${id} Lv.${lv}`).join(', ') || '(none)';
      write('[Harness] summary:');
      write(`  played turns : ${played}`);
      write(`  final turn   : ${state.turn}`);
      write(`  final phase  : ${state.phase}`);
      write(`  final score  : ${state.score}`);
      write(`  enemies alive: ${state.enemies.filter(e => !e.isDead).length}`);
      write(`  unlocked     : ${unlocked}`);
      write(`  game over    : ${GameLogic.isGameOver(state)}`);
      if (state.deathMessage) write(`  death reason : ${state.deathMessage}`);

      // 暴露给控制台手动操作
      window.state = state;
      console.log('[Harness] window.state 已注入，可在控制台继续操作');
    }

    $('run').addEventListener('click', runHarness);
    $('clear').addEventListener('click', () => { out.textContent = ''; });
  </script>
</body>
</html>
